<section class="faq container">
    <h2 class="faq__title">FAQ</h2>
    <div class="faq__container">
      <div class="faq__item">
        <button class="faq__question" aria-expanded="false">
          Do you offer customized IT solutions?
          <span class="faq__icon">
            <img
              src="./icons/faq/plus.svg"
              alt="plus-icon"
              class="faq__icon--plus"
            />
            <img
              src="./icons/faq/minus.svg"
              alt="minus-icon"
              class="faq__icon--minus"
            />

        </button>
        <div class="faq__answer">
          <p class="faq__text">
            Yes, we offer fully customized IT solutions tailored to your specific needs and requirements.
          </p>
        </div>
      </div>
    </div>
  </section>
